<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drinks</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      text-align: center;
    }

    .topbar {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.95);
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      z-index: 10;
    }

    .back-button {
      display: inline-block;
      text-decoration: none;
      background: #2f6b2f;
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: bold;
    }

    .container {
      padding: 20px 12px 40px;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="back-button">← Back</a>
  </div>

  <div class="container">
    <img src="MEZZE-TAPAS-ES-EN.2.jpeg" alt="Drinks menu" />
  </div>

</html>
